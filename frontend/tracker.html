<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f9f9f7;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 48px 24px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        header h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
        header p { margin-top: 6px; color: #666; font-size: 15px; }

        .back-btn {
            background: none;
            border: 1px solid #e8e8e4;
            border-radius: 8px;
            padding: 8px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            cursor: pointer;
            color: #444;
            transition: background 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover { background: #f0f0ee; }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: white;
            border: 1px solid #e8e8e4;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 600;
            letter-spacing: -1px;
            line-height: 1;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 6px;
        }

        .stat-blue { color: #2563eb; }
        .stat-green { color: #2d7a4f; }
        .stat-orange { color: #c67c00; }
        .stat-red { color: #c0392b; }

        .card {
            background: white;
            border: 1px solid #e8e8e4;
            border-radius: 12px;
            padding: 28px;
            margin-bottom: 24px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: #888;
        }

        .empty-state h2 { font-size: 20px; margin-bottom: 8px; color: #444; }
        .empty-state p { font-size: 14px; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #888;
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #e8e8e4;
        }

        td {
            padding: 14px 12px;
            font-size: 14px;
            border-bottom: 1px solid #f0f0ee;
            vertical-align: middle;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafaf8; }

        .company-name { font-weight: 600; }
        .job-title { color: #555; font-size: 13px; margin-top: 2px; }

        .score-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .score-high { background: #eaf5ee; color: #2d7a4f; }
        .score-mid  { background: #fff8e6; color: #c67c00; }
        .score-low  { background: #fdecea; color: #c0392b; }

        .status-select {
            padding: 6px 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            background: #fafafa;
            cursor: pointer;
            outline: none;
        }

        .status-select:focus { border-color: #1a1a1a; }

        .status-applied { border-color: #93c5fd; background: #eff6ff; color: #1d4ed8; }
        .status-interview { border-color: #fcd34d; background: #fffbeb; color: #92400e; }
        .status-offer { border-color: #6ee7b7; background: #ecfdf5; color: #065f46; }
        .status-rejected { border-color: #fca5a5; background: #fef2f2; color: #991b1b; }
        .status-withdrawn { border-color: #d1d5db; background: #f9fafb; color: #374151; }

        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 4px;
            opacity: 0.4;
            transition: opacity 0.2s;
            margin-top: 0;
            width: auto;
        }

        .delete-btn:hover { opacity: 1; background: #fdecea; }

        .date-cell {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">

        <header>
            <div>
                <h1>Application Tracker</h1>
                <p>All your job applications in one place.</p>
            </div>
            <a href="/static/index.html" class="back-btn">← Back to Analyzer</a>
        </header>

        <!-- Stats -->
        <div class="stats-row" id="stats-row"></div>

        <!-- Table -->
        <div class="card" id="table-card">
            <div class="empty-state" id="empty-state" style="display:none">
                <h2>No applications yet</h2>
                <p>Analyze a resume to automatically log your first application.</p>
            </div>
            <table id="tracker-table" style="display:none">
                <thead>
                    <tr>
                        <th>Company & Role</th>
                        <th>ATS Score</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="tracker-body"></tbody>
            </table>
        </div>

    </div>

<script>
    const STATUSES = ["Applied", "Interview Scheduled", "Offer Received", "Rejected", "Withdrawn"];

    function getStatusClass(status) {
        const map = {
            "Applied": "status-applied",
            "Interview Scheduled": "status-interview",
            "Offer Received": "status-offer",
            "Rejected": "status-rejected",
            "Withdrawn": "status-withdrawn"
        };
        return map[status] || "";
    }

    function getScoreClass(score) {
        if (score >= 75) return "score-high";
        if (score >= 50) return "score-mid";
        return "score-low";
    }

    function renderStats(applications) {
        const total = applications.length;
        const interviews = applications.filter(a => a.status === "Interview Scheduled").length;
        const offers = applications.filter(a => a.status === "Offer Received").length;
        const avgScore = total > 0
            ? Math.round(applications.reduce((sum, a) => sum + a.ats_score, 0) / total)
            : 0;

        document.getElementById('stats-row').innerHTML = `
            <div class="stat-card">
                <div class="stat-number stat-blue">${total}</div>
                <div class="stat-label">Total Applied</div>
            </div>
            <div class="stat-card">
                <div class="stat-number stat-orange">${interviews}</div>
                <div class="stat-label">Interviews</div>
            </div>
            <div class="stat-card">
                <div class="stat-number stat-green">${offers}</div>
                <div class="stat-label">Offers</div>
            </div>
            <div class="stat-card">
                <div class="stat-number ${getScoreClass(avgScore)}">${avgScore}</div>
                <div class="stat-label">Avg ATS Score</div>
            </div>
        `;
    }

    function renderTable(applications) {
        if (!applications.length) {
            document.getElementById('empty-state').style.display = 'block';
            document.getElementById('tracker-table').style.display = 'none';
            return;
        }

        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('tracker-table').style.display = 'table';

        const tbody = document.getElementById('tracker-body');
        tbody.innerHTML = '';

        // Show newest first
        [...applications].reverse().forEach(app => {
            const statusOptions = STATUSES.map(s =>
                `<option value="${s}" ${s === app.status ? 'selected' : ''}>${s}</option>`
            ).join('');

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>
                    <div class="company-name">${app.company}</div>
                    <div class="job-title">${app.job_title}</div>
                </td>
                <td>
                    <span class="score-badge ${getScoreClass(app.ats_score)}">${app.ats_score}/100</span>
                </td>
                <td class="date-cell">${app.date_applied}</td>
                <td>
                    <select class="status-select ${getStatusClass(app.status)}"
                        onchange="updateStatus(${app.id}, this)">
                        ${statusOptions}
                    </select>
                </td>
                <td>
                    <button class="delete-btn" onclick="deleteApp(${app.id}, this)">🗑️</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    async function loadTracker() {
        try {
            const response = await fetch('/tracker');
            const data = await response.json();
            renderStats(data.applications);
            renderTable(data.applications);
        } catch (err) {
            console.error('Could not load tracker:', err);
        }
    }

    async function updateStatus(id, selectEl) {
        const status = selectEl.value;
        selectEl.className = `status-select ${getStatusClass(status)}`;

        const formData = new FormData();
        formData.append('application_id', id);
        formData.append('status', status);

        await fetch('/tracker/update-status', { method: 'POST', body: formData });
        loadTracker();
    }

    async function deleteApp(id, btn) {
        if (!confirm('Delete this application?')) return;

        const formData = new FormData();
        formData.append('application_id', id);

        await fetch('/tracker/delete', { method: 'POST', body: formData });
        loadTracker();
    }

    loadTracker();
</script>

</body>
</html>
