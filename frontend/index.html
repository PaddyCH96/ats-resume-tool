<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Resume Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f9f9f7;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 48px 24px;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        header p {
            margin-top: 6px;
            color: #666;
            font-size: 15px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e8e8e4;
            border-radius: 12px;
            padding: 28px;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #444;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px dashed #ccc;
            border-radius: 8px;
            background: #fafafa;
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            resize: vertical;
            background: #fafafa;
            color: #1a1a1a;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #1a1a1a;
            background: #fff;
        }

        button {
            margin-top: 16px;
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #333;
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        #loading {
            text-align: center;
            padding: 24px;
            color: #666;
            font-size: 15px;
        }

        .score-display {
            text-align: center;
            padding: 24px 0;
        }

        .score-number {
            font-size: 72px;
            font-weight: 600;
            letter-spacing: -3px;
            line-height: 1;
        }

        .score-label {
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 6px;
        }

        .score-high { color: #2d7a4f; }
        .score-mid  { color: #c67c00; }
        .score-low  { color: #c0392b; }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 12px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }

        .tag {
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 500;
        }

        .tag-green {
            background: #eaf5ee;
            color: #2d7a4f;
        }

        .tag-red {
            background: #fdecea;
            color: #c0392b;
        }

        ul {
            padding-left: 18px;
        }

        ul li {
            font-size: 14px;
            color: #333;
            margin-bottom: 6px;
            line-height: 1.5;
        }

        .divider {
            border: none;
            border-top: 1px solid #e8e8e4;
            margin: 20px 0;
        }

        #tailored-text {
            white-space: pre-wrap;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">

        <header>
            <h1>ATS Resume Analyzer</h1>
            <p>Upload your resume and paste a job description to get your ATS score.</p>
        </header>

        <div class="card">
            <form id="upload-form">
                <label for="resume">Resume (PDF)</label>
                <input type="file" id="resume" accept=".pdf" required>

                <label for="job-description">Job Description</label>
                <textarea id="job-description" placeholder="Paste the job description here..." required></textarea>

                <button type="submit" id="analyze-btn">Analyze Resume</button>
            </form>
        </div>

        <p id="loading" style="display:none">⏳ Analyzing your resume, please wait...</p>

        <div id="results" style="display:none">

            <div class="card">
                <div class="score-display">
                    <div class="score-number" id="score"></div>
                    <div class="score-label">ATS Score out of 100</div>
                </div>
            </div>

            <div class="card">
                <div class="section-title">Matched Keywords</div>
                <div class="tags" id="matched-keywords"></div>

                <hr class="divider">

                <div class="section-title">Missing Keywords</div>
                <div class="tags" id="missing-keywords"></div>
            </div>

            <div class="card">
                <div class="section-title">Strengths</div>
                <ul id="strengths"></ul>

                <hr class="divider">

                <div class="section-title">Suggestions</div>
                <ul id="suggestions"></ul>
            </div>

            <div class="card">
                <button id="generate-btn" onclick="generateResume()">Generate Tailored Resume</button>
            </div>

        </div>

        <div id="tailored-result" style="display:none">
            <div class="card">
                <div class="section-title">Tailored Resume</div>
                <pre id="tailored-text"></pre>
            </div>
        </div>

    </div>

<script>
    document.getElementById('upload-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const resume = document.getElementById('resume').files[0];
        const jobDescription = document.getElementById('job-description').value;

        document.getElementById('loading').style.display = 'block';
        document.getElementById('results').style.display = 'none';
        document.getElementById('tailored-result').style.display = 'none';
        document.getElementById('analyze-btn').disabled = true;

        const formData = new FormData();
        formData.append('resume', resume);
        formData.append('job_description', jobDescription);

        const response = await fetch('/upload-resume', {
            method: 'POST',
            body: formData
        });

        const data = await response.json();

        document.getElementById('loading').style.display = 'none';
        document.getElementById('analyze-btn').disabled = false;

        const scoreEl = document.getElementById('score');
        scoreEl.textContent = data.ats_score;
        scoreEl.className = 'score-number';
        if (data.ats_score >= 75) scoreEl.classList.add('score-high');
        else if (data.ats_score >= 50) scoreEl.classList.add('score-mid');
        else scoreEl.classList.add('score-low');

        document.getElementById('results').style.display = 'block';

        function fillTags(id, items, tagClass) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            items.forEach(item => {
                const span = document.createElement('span');
                span.className = `tag ${tagClass}`;
                span.textContent = item;
                container.appendChild(span);
            });
        }

        function fillList(id, items) {
            const ul = document.getElementById(id);
            ul.innerHTML = '';
            items.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                ul.appendChild(li);
            });
        }

        fillTags('matched-keywords', data.matched_keywords, 'tag-green');
        fillTags('missing-keywords', data.missing_keywords, 'tag-red');
        fillList('strengths', data.strengths);
        fillList('suggestions', data.suggestions);
    });

    async function generateResume() {
        document.getElementById('generate-btn').disabled = true;
        document.getElementById('generate-btn').textContent = '⏳ Generating...';

        const response = await fetch('/generate-resume', {
            method: 'POST'
        });

        const data = await response.json();

        document.getElementById('generate-btn').textContent = 'Generate Tailored Resume';
        document.getElementById('generate-btn').disabled = false;
        document.getElementById('tailored-text').textContent = data.tailored_resume;
        document.getElementById('tailored-result').style.display = 'block';
    }
</script>

</body>
</html>
